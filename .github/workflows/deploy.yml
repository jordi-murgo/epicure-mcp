name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: epicure-mcp-ne
  AZURE_ENV: epicure-mcp-env
  CONTAINER_APP: epicure-mcp
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image
        run: |
          IMAGE="$ACR_NAME.azurecr.io/$CONTAINER_APP:$IMAGE_TAG"
          docker build \
            -t "$IMAGE" \
            -t "$ACR_NAME.azurecr.io/$CONTAINER_APP:latest" \
            .
          docker push "$IMAGE"
          docker push "$ACR_NAME.azurecr.io/$CONTAINER_APP:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$AZURE_RG" \
            --image "$IMAGE" \
            --set-env-vars \
              RATE_LIMIT_PER_MINUTE=60 \
              RATE_LIMIT_BURST=10

      - name: Wait for revision to be active and smoke-test
        run: |
          set -e
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP" \
            --resource-group "$AZURE_RG" \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "FQDN: $FQDN"
          for i in {1..30}; do
            if curl -sf "https://$FQDN/healthz" >/dev/null; then
              echo "healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Service did not become healthy"
          exit 1
